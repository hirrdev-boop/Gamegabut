<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlockVerse - Game 3D</title>
    <style>
        /* Reset & Fullscreen */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Segoe UI', Arial, sans-serif;
            cursor: default;
        }
        canvas {
            display: block;
        }

        /* HUD - kiri atas */
        #hud {
            position: fixed;
            top: 20px;
            left: 24px;
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.7);
            pointer-events: none;
            z-index: 10;
            user-select: none;
            line-height: 1.6;
        }
        #hud .score {
            font-size: 28px;
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 18px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        #hud .score span {
            color: #ffd700;
        }
        #hud .info {
            font-size: 14px;
            opacity: 0.7;
            margin-top: 6px;
            font-weight: 400;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 14px;
            border-radius: 20px;
            display: inline-block;
        }

        /* Crosshair */
        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
            opacity: 0.8;
        }
        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.7);
        }
        #crosshair::before {
            width: 2px;
            height: 20px;
            top: -10px;
            left: -1px;
        }
        #crosshair::after {
            width: 20px;
            height: 2px;
            top: -1px;
            left: -10px;
        }
        #crosshair .dot {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            top: -2px;
            left: -2px;
        }

        /* Overlay Mulai */
        #startOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: #fff;
            text-align: center;
            padding: 20px;
            transition: opacity 0.6s ease;
            user-select: none;
        }
        #startOverlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #startOverlay h1 {
            font-size: 64px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffd700, #ff6b35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        #startOverlay .subtitle {
            font-size: 18px;
            color: #aaa;
            margin-bottom: 30px;
            font-weight: 300;
        }
        #startOverlay .controls-info {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 24px 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 30px;
            font-size: 14px;
            line-height: 2;
            color: #ccc;
        }
        #startOverlay .controls-info kbd {
            background: rgba(255, 255, 255, 0.12);
            padding: 2px 12px;
            border-radius: 6px;
            font-family: inherit;
            color: #fff;
            font-weight: 600;
            font-size: 13px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #startOverlay .btn-play {
            background: linear-gradient(135deg, #ffd700, #f5a623);
            border: none;
            color: #1a1a2e;
            font-size: 22px;
            font-weight: 700;
            padding: 16px 56px;
            border-radius: 60px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 8px 32px rgba(255, 215, 0, 0.3);
            letter-spacing: 1px;
        }
        #startOverlay .btn-play:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 48px rgba(255, 215, 0, 0.5);
        }
        #startOverlay .btn-play:active {
            transform: scale(0.95);
        }

        /* Pesan Menang */
        #winMessage {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            padding: 40px 60px;
            border-radius: 24px;
            color: #fff;
            text-align: center;
            z-index: 50;
            border: 2px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.8);
            display: none;
            pointer-events: none;
            user-select: none;
        }
        #winMessage.show {
            display: block;
            pointer-events: auto;
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        #winMessage h2 {
            font-size: 48px;
            background: linear-gradient(135deg, #ffd700, #ff6b35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        #winMessage p {
            font-size: 18px;
            opacity: 0.8;
        }
        #winMessage .emoji-big {
            font-size: 72px;
            -webkit-text-fill-color: initial;
        }

        @keyframes popIn {
            0% {
                transform: translate(-50%, -50%) scale(0.6);
                opacity: 0;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        /* Responsif */
        @media (max-width: 640px) {
            #startOverlay h1 {
                font-size: 36px;
            }
            #startOverlay .controls-info {
                padding: 16px 20px;
                font-size: 12px;
            }
            #startOverlay .btn-play {
                font-size: 18px;
                padding: 14px 36px;
            }
            #hud .score {
                font-size: 20px;
                padding: 4px 14px;
            }
            #winMessage {
                padding: 28px 20px;
                width: 90%;
            }
            #winMessage h2 {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>

    <!-- HUD -->
    <div id="hud">
        <div class="score">🪙 <span id="scoreDisplay">0</span> / <span id="totalGems">15</span></div>
        <div class="info" id="statusInfo">Kumpulkan semua koin!</div>
    </div>

    <!-- Crosshair -->
    <div id="crosshair"><div class="dot"></div></div>

    <!-- Start Overlay -->
    <div id="startOverlay">
        <h1>⛏️ BlockVerse</h1>
        <div class="subtitle">Jelajahi dunia 3D &amp; kumpulkan koin!</div>
        <div class="controls-info">
            <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> — Gerak &nbsp;·&nbsp;
            <kbd>Spasi</kbd> — Lompat &nbsp;·&nbsp;
            <kbd>Mouse</kbd> — Lihat sekeliling
        </div>
        <button class="btn-play" id="playBtn">▶ Mainkan</button>
    </div>

    <!-- Win Message -->
    <div id="winMessage">
        <div class="emoji-big">🎉</div>
        <h2>Selamat!</h2>
        <p>Kamu berhasil mengumpulkan semua koin!</p>
    </div>

    <!-- Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        // ============================================================
        // 1. IMPORTS
        // ============================================================
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // ============================================================
        // 2. DOM REFS
        // ============================================================
        const scoreSpan = document.getElementById('scoreDisplay');
        const totalSpan = document.getElementById('totalGems');
        const statusInfo = document.getElementById('statusInfo');
        const winMessage = document.getElementById('winMessage');
        const startOverlay = document.getElementById('startOverlay');
        const playBtn = document.getElementById('playBtn');

        // ============================================================
        // 3. SCENE, CAMERA, RENDERER
        // ============================================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // sky blue
        scene.fog = new THREE.Fog(0x87CEEB, 60, 120);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 1.7, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.prepend(renderer.domElement);

        // ============================================================
        // 4. CONTROLS
        // ============================================================
        const controls = new PointerLockControls(camera, renderer.domElement);
        let isLocked = false;

        controls.addEventListener('lock', () => { isLocked = true; });
        controls.addEventListener('unlock', () => { isLocked = false; });

        // ============================================================
        // 5. LIGHTING
        // ============================================================
        const ambientLight = new THREE.AmbientLight(0x8899bb, 0.4);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffeedd, 1.8);
        sunLight.position.set(30, 40, 20);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.near = 0.1;
        sunLight.shadow.camera.far = 100;
        sunLight.shadow.camera.left = -50;
        sunLight.shadow.camera.right = 50;
        sunLight.shadow.camera.top = 50;
        sunLight.shadow.camera.bottom = -50;
        scene.add(sunLight);

        const fillLight = new THREE.DirectionalLight(0x8888ff, 0.3);
        fillLight.position.set(-20, 10, -30);
        scene.add(fillLight);

        const hemi = new THREE.HemisphereLight(0x87CEEB, 0x3a7d44, 0.5);
        scene.add(hemi);

        // ============================================================
        // 6. GROUND
        // ============================================================
        const groundSize = 60;

        // Buat texture grid dengan canvas
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');

        // Warna dasar rumput
        ctx.fillStyle = '#5da653';
        ctx.fillRect(0, 0, 512, 512);

        // Grid garis
        const step = 64;
        ctx.strokeStyle = 'rgba(255,255,255,0.07)';
        ctx.lineWidth = 2;
        for (let i = 0; i <= 512; i += step) {
            ctx.beginPath();
            ctx.moveTo(i, 0);
            ctx.lineTo(i, 512);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i);
            ctx.lineTo(512, i);
            ctx.stroke();
        }

        // Beberapa bintik rumput
        for (let i = 0; i < 3000; i++) {
            const x = Math.random() * 512;
            const y = Math.random() * 512;
            const r = Math.random() * 3 + 1;
            const alpha = Math.random() * 0.15;
            ctx.fillStyle = `rgba(60, 130, 60, ${alpha})`;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();
        }

        const groundTexture = new THREE.CanvasTexture(canvas);
        groundTexture.wrapS = THREE.RepeatWrapping;
        groundTexture.wrapT = THREE.RepeatWrapping;
        groundTexture.repeat.set(groundSize / 8, groundSize / 8);
        groundTexture.anisotropy = renderer.capabilities.getMaxAnisotropy();

        const groundMat = new THREE.MeshStandardMaterial({
            map: groundTexture,
            roughness: 0.8,
            metalness: 0.0,
        });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(groundSize, groundSize), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.01;
        ground.receiveShadow = true;
        scene.add(ground);

        // ============================================================
        // 7. BANGUNAN & POHON
        // ============================================================
        // Data bangunan: { x, z, w, h, d, color }
        const buildingsData = [
            { x: -10, z: -6, w: 5, h: 3.5, d: 5, color: 0x4a7db4 },
            { x: 8, z: -9, w: 6, h: 5.0, d: 5, color: 0xcf6f3a },
            { x: -7, z: 10, w: 4, h: 6.0, d: 4, color: 0x5a8f4c },
            { x: 11, z: 7, w: 5, h: 2.8, d: 5, color: 0xb84a6a },
            { x: -13, z: -13, w: 4, h: 4.0, d: 4, color: 0x8a6e4b },
            { x: 14, z: -14, w: 4, h: 4.5, d: 4, color: 0x6a8f9a },
        ];

        const buildings = [];
        const buildingMeshes = [];

        buildingsData.forEach((b) => {
            const group = new THREE.Group();

            // Body
            const bodyMat = new THREE.MeshStandardMaterial({
                color: b.color,
                roughness: 0.6,
                metalness: 0.1,
            });
            const body = new THREE.Mesh(new THREE.BoxGeometry(b.w, b.h, b.d), bodyMat);
            body.position.y = b.h / 2;
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);

            // Atap (lebih gelap)
            const roofMat = new THREE.MeshStandardMaterial({
                color: new THREE.Color(b.color).multiplyScalar(0.7).getHex(),
                roughness: 0.7,
                metalness: 0.0,
            });
            const roof = new THREE.Mesh(new THREE.BoxGeometry(b.w + 0.6, 0.3, b.d + 0.6), roofMat);
            roof.position.y = b.h + 0.15;
            roof.castShadow = true;
            roof.receiveShadow = true;
            group.add(roof);

            // Jendela (dekorasi)
            const winMat = new THREE.MeshStandardMaterial({
                color: 0x88ccff,
                emissive: 0x4488aa,
                emissiveIntensity: 0.15,
                roughness: 0.1,
                metalness: 0.3,
            });
            const winPositions = [
                [-b.w * 0.3, b.h * 0.6, b.d / 2 + 0.01],
                [b.w * 0.3, b.h * 0.6, b.d / 2 + 0.01],
                [-b.w * 0.3, b.h * 0.3, b.d / 2 + 0.01],
                [b.w * 0.3, b.h * 0.3, b.d / 2 + 0.01],
                [-b.w * 0.3, b.h * 0.6, -b.d / 2 - 0.01],
                [b.w * 0.3, b.h * 0.6, -b.d / 2 - 0.01],
            ];
            winPositions.forEach((wp) => {
                const win = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 1.0), winMat);
                win.position.set(wp[0], wp[1], wp[2]);
                if (wp[2] > 0) win.rotation.y = 0;
                else win.rotation.y = Math.PI;
                group.add(win);
            });

            group.position.set(b.x, 0, b.z);
            scene.add(group);

            // Simpan data untuk collision
            buildings.push({
                x: b.x,
                z: b.z,
                w: b.w,
                h: b.h,
                d: b.d,
                minX: b.x - b.w / 2,
                maxX: b.x + b.w / 2,
                minZ: b.z - b.d / 2,
                maxZ: b.z + b.d / 2,
            });
            buildingMeshes.push(group);
        });

        // ---- POHON ----
        function createTree(x, z) {
            const group = new THREE.Group();
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8b6b4b, roughness: 0.9 });
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.5, 1.8, 6), trunkMat);
            trunk.position.y = 0.9;
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            group.add(trunk);

            const leafMat = new THREE.MeshStandardMaterial({
                color: new THREE.Color().setHSL(0.28 + Math.random() * 0.06, 0.6, 0.35 + Math.random() * 0.12),
                roughness: 0.8,
            });
            const crown = new THREE.Mesh(new THREE.ConeGeometry(1.6 + Math.random() * 0.6, 2.2 + Math.random() * 0.6, 7),
            leafMat);
            crown.position.y = 2.2 + Math.random() * 0.3;
            crown.castShadow = true;
            crown.receiveShadow = true;
            group.add(crown);

            group.position.set(x, 0, z);
            return group;
        }

        const treePositions = [
            [-18, -8],
            [-16, 12],
            [18, -10],
            [20, 12],
            [-20, 2],
            [22, -2],
            [-5, -18],
            [5, 18],
            [-12, -20],
            [15, -18],
            [-22, -16],
            [24, 16],
        ];
        treePositions.forEach((p) => {
            const tree = createTree(p[0], p[1]);
            scene.add(tree);
        });

        // ============================================================
        // 8. KOIN (GEMS)
        // ============================================================
        const gems = [];
        const gemPositions = [
            [-4, 1.2, -3],
            [5, 1.8, -5],
            [-2, 2.5, 7],
            [9, 1.5, 5],
            [-9, 1.2, -9],
            [3, 2.0, -11],
            [-11, 1.8, 5],
            [12, 1.5, 9],
            [-6, 3.0, -14],
            [14, 2.2, -6],
            [-14, 1.5, 12],
            [7, 1.8, 14],
            [0, 2.8, -16],
            [16, 1.5, 2],
            [-16, 2.0, -2],
        ];

        const gemMat = new THREE.MeshStandardMaterial({
            color: 0xffd700,
            emissive: 0xffaa00,
            emissiveIntensity: 0.4,
            roughness: 0.2,
            metalness: 0.5,
        });

        gemPositions.forEach((pos, i) => {
            const gem = new THREE.Mesh(new THREE.OctahedronGeometry(0.45, 0), gemMat);
            gem.position.set(pos[0], pos[1], pos[2]);
            gem.castShadow = true;
            gem.receiveShadow = true;
            gem.userData = {
                baseY: pos[1],
                phase: Math.random() * Math.PI * 2,
                collected: false,
                index: i,
            };
           scene.add(gem);
            gems.push(gem);
        });

        totalSpan.textContent = gems.length;

        // ============================================================
        // 9. PLAYER STATE
        // ============================================================
        const player = {
            height: 1.7,
            speed: 6.0,
            jumpSpeed: 7.5,
            gravity: -22,
            velocity: new THREE.Vector3(0, 0, 0),
            onGround: false,
            score: 0,
            collected: new Set(),
        };

        // ============================================================
        // 10. KEYBOARD
        // ============================================================
        const keys = { w: false, a: false, s: false, d: false, space: false };
        document.addEventListener('keydown', (e) => {
            switch (e.code) {
                case 'KeyW':
                    keys.w = true;
                    e.preventDefault();
                    break;
                case 'KeyA':
                    keys.a = true;
                    e.preventDefault();
                    break;
                case 'KeyS':
                    keys.s = true;
                    e.preventDefault();
                    break;
                case 'KeyD':
                    keys.d = true;
                    e.preventDefault();
                    break;
                case 'Space':
                    keys.space = true;
                    e.preventDefault();
                    if (isLocked && player.onGround) {
                        player.velocity.y = player.jumpSpeed;
                        player.onGround = false;
                    }
                    break;
            }
        });
        document.addEventListener('keyup', (e) => {
            switch (e.code) {
                case 'KeyW':
                    keys.w = false;
                    e.preventDefault();
                    break;
                case 'KeyA':
                    keys.a = false;
                    e.preventDefault();
                    break;
                case 'KeyS':
                    keys.s = false;
                    e.preventDefault();
                    break;
                case 'KeyD':
                    keys.d = false;
                    e.preventDefault();
                    break;
                case 'Space':
                    keys.space = false;
                    e.preventDefault();
                    break;
            }
        });

        // ============================================================
        // 11. COLLISION & GAME LOGIC
        // ============================================================
        const playerRadius = 0.45;

        function checkBuildingCollision(pos) {
            for (const b of buildings) {
                const px = pos.x,
                    pz = pos.z;
                const hw = b.w / 2 + playerRadius;
                const hd = b.d / 2 + playerRadius;
                if (px > b.x - hw && px < b.x + hw &&
                    pz > b.z - hd && pz < b.z + hd) {
                    // Push out
                    const overlapX = Math.min(px - (b.x - hw), (b.x + hw) - px);
                    const overlapZ = Math.min(pz - (b.z - hd), (b.z + hd) - pz);
                    if (overlapX < overlapZ) {
                        if (px < b.x) pos.x = b.x - hw;
                        else pos.x = b.x + hw;
                    } else {
                        if (pz < b.z) pos.z = b.z - hd;
                        else pos.z = b.z + hd;
                    }
                    return true;
                }
            }
            return false;
        }

        function clampToMap(pos) {
            const limit = groundSize / 2 - 1;
            pos.x = Math.max(-limit, Math.min(limit, pos.x));
            pos.z = Math.max(-limit, Math.min(limit, pos.z));
        }

        function collectGem(playerPos) {
            for (const gem of gems) {
                if (gem.userData.collected) continue;
                const dist = playerPos.distanceTo(gem.position);
                if (dist < 1.4) {
                    gem.userData.collected = true;
                    gem.visible = false;
                    player.score++;
                    scoreSpan.textContent = player.score;
                    // Efek kecil: status berubah
                    statusInfo.textContent = `🪙 ${player.score} / ${gems.length} koin`;
                    // Cek menang
                    if (player.score === gems.length) {
                        winMessage.classList.add('show');
                        statusInfo.textContent = '🎉 Semua koin terkumpul!';
                    }
                }
            }
        }

        // ============================================================
        // 12. RESIZE
        // ============================================================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ============================================================
        // 13. START / PLAY
        // ============================================================
        playBtn.addEventListener('click', () => {
            startOverlay.classList.add('hidden');
            controls.lock();
        });

        // Klik lagi untuk lock jika unlock
        renderer.domElement.addEventListener('click', () => {
            if (!isLocked && startOverlay.classList.contains('hidden')) {
                controls.lock();
            }
        });

        // ============================================================
        // 14. GAME LOOP
        // ============================================================
        const clock = new THREE.Clock();
        let elapsedTime = 0;

        function animate() {
            const delta = Math.min(clock.getDelta(), 0.05);
            elapsedTime += delta;

            // --- Gerakan pemain ---
            if (isLocked) {
                const forward = new THREE.Vector3(0, 0, -1);
                forward.applyQuaternion(camera.quaternion);
                forward.y = 0;
                forward.normalize();

                const right = new THREE.Vector3(1, 0, 0);
                right.applyQuaternion(camera.quaternion);
                right.y = 0;
                right.normalize();

                const move = new THREE.Vector3(0, 0, 0);
                if (keys.w) move.add(forward);
                if (keys.s) move.sub(forward);
                if (keys.a) move.sub(right);
                if (keys.d) move.add(right);

                if (move.length() > 0) {
                    move.normalize().multiplyScalar(player.speed * delta);
                }

                // Posisi baru sementara
                const newPos = camera.position.clone();
                newPos.x += move.x;
                newPos.z += move.z;

                // Collision dengan bangunan
                checkBuildingCollision(newPos);
                clampToMap(newPos);

                // Terapkan posisi
                camera.position.x = newPos.x;
                camera.position.z = newPos.z;

                // --- Gravitasi & Lompat ---
                player.velocity.y += player.gravity * delta;
                camera.position.y += player.velocity.y * delta;

                // Ground collision
                if (camera.position.y <= player.height) {
                    camera.position.y = player.height;
                    player.velocity.y = 0;
                    player.onGround = true;
                } else {
                    player.onGround = false;
                }

                // Koleksi koin
                collectGem(camera.position);
            }

            // --- Animasi koin (bobbing + spinning) ---
            for (const gem of gems) {
                if (gem.userData.collected) continue;
                const phase = gem.userData.phase;
                gem.position.y = gem.userData.baseY + Math.sin(elapsedTime * 2.0 + phase) * 0.25;
                gem.rotation.x += delta * 1.5;
                gem.rotation.y += delta * 2.0;
            }

            // --- Render ---
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        animate();

        // ============================================================
        // 15. TOMBOL RESTART (klik pesan menang untuk reset)
        // ============================================================
        winMessage.addEventListener('click', () => {
            // Reset semua koin
            for (const gem of gems) {
                gem.userData.collected = false;
                gem.visible = true;
            }
            player.score = 0;
            scoreSpan.textContent = '0';
            statusInfo.textContent = 'Kumpulkan semua koin!';
            winMessage.classList.remove('show');
            // Reset posisi pemain
            camera.position.set(0, player.height, 0);
            player.velocity.set(0, 0, 0);
            player.onGround = false;
            controls.lock();
        });

        // ============================================================
        // 16. INITIAL STATUS
        // ============================================================
        statusInfo.textContent = `🪙 0 / ${gems.length} koin`;

        console.log('🚀 BlockVerse siap dimainkan!');
        console.log(`📍 ${gems.length} koin tersembunyi di dunia.`);
    </script>
</body>
</html>
